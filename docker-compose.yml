version: "3.9"

services:
  # ─── Base de datos PostgreSQL ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - nexus_net

  # ─── Aplicación NEXUS ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus_app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # Base de datos (apunta al servicio postgres de este compose)
      DATABASE_URL: "postgresql://nexus:${POSTGRES_PASSWORD}@postgres:5432/nexus?schema=public"

      # NextAuth — OBLIGATORIO
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}

      # Pusher — dejar vacío si no se usa
      NEXT_PUBLIC_PUSHER_KEY: ${NEXT_PUBLIC_PUSHER_KEY:-}
      NEXT_PUBLIC_PUSHER_CLUSTER: ${NEXT_PUBLIC_PUSHER_CLUSTER:-us2}
      PUSHER_APP_ID: ${PUSHER_APP_ID:-}
      PUSHER_SECRET: ${PUSHER_SECRET:-}

      # Resend (emails) — dejar vacío si no se usa
      RESEND_API_KEY: ${RESEND_API_KEY:-}

      # UploadThing (archivos) — dejar vacío si no se usa
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      UPLOADTHING_APP_ID: ${UPLOADTHING_APP_ID:-}

      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus_net

# ─── Volúmenes ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Red interna ───────────────────────────────────────────
networks:
  nexus_net:
    driver: bridge
